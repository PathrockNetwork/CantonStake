# CantonStake app-layer services.
#
# This compose file runs the backend, frontend, PostgreSQL, and Redis.
# It assumes CN Quickstart LocalNet is already running separately via
# `make start` from the cn-quickstart/quickstart directory.
#
# Usage:
#   1. Start LocalNet: cd ../cn-quickstart/quickstart && make start
#   2. Deploy MockValidatorShare to Amoy: cd evm && npm run deploy:amoy
#   3. Copy the deployed address, party IDs, and FeaturedAppRight CID into .env
#   4. From the cantonstake root: docker compose up --build
#
# The backend connects to LocalNet's App Provider participant on
# host.docker.internal:3975 (JSON Ledger API).

services:
  # ── Persistence ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: cantonstake-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cantonstake
      POSTGRES_PASSWORD: cantonstake
      POSTGRES_DB: cantonstake
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cantonstake"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cantonstake-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Application ──────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      cache_from:
        - cantonstake-backend:local
      cache_to:
        - type=inline
    image: ${BACKEND_IMAGE:-cantonstake-backend:local}
    container_name: cantonstake-backend
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - LOG_LEVEL=info
      - DEMO_MODE=${DEMO_MODE:-true}
      - MOCK_REWARDS=${MOCK_REWARDS:-true}
      - MOCK_REWARDS_SEED=${MOCK_REWARDS_SEED:-20260505}
      - AMOY_RPC_URL=${AMOY_RPC_URL:-https://rpc-amoy.polygon.technology}
      - MOCK_VALIDATOR_SHARE_ADDRESS=${MOCK_VALIDATOR_SHARE_ADDRESS}
      - CANTON_JSON_API_URL=${CANTON_JSON_API_URL:-http://host.docker.internal:3975}
      - CANTON_APP_PROVIDER_PARTY=${CANTON_APP_PROVIDER_PARTY}
      - CANTON_AUTH_TOKEN=${CANTON_AUTH_TOKEN:-}
      - CANTON_DELEGATOR_PARTY=${CANTON_DELEGATOR_PARTY}
      - CANTON_DELEGATOR_AUTH_TOKEN=${CANTON_DELEGATOR_AUTH_TOKEN:-}
      - FEATURED_APP_RIGHT_CID=${FEATURED_APP_RIGHT_CID:-}
      - DATABASE_URL=postgresql://cantonstake:cantonstake@postgres:5432/cantonstake
      - REDIS_URL=redis://redis:6379
      - SCAN_API_URL=${SCAN_API_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VALIDATOR_SCORING_DISABLED=${VALIDATOR_SCORING_DISABLED:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - DISCORD_DEFAULT_WEBHOOK=${DISCORD_DEFAULT_WEBHOOK:-}
      - AUTO_COMPOUND_DISABLED=${AUTO_COMPOUND_DISABLED:-true}
      - AUTO_COMPOUND_KEEPER_KEY=${AUTO_COMPOUND_KEEPER_KEY:-}
      - MOONBEAM_RPC_URL=${MOONBEAM_RPC_URL:-https://rpc.api.moonbase.moonbeam.network}
      - MONAD_RPC_URL=${MONAD_RPC_URL:-https://testnet-rpc.monad.xyz}
      - MONAD_STAKING_CONTRACT=${MONAD_STAKING_CONTRACT:-}
      - COSMOS_REST_URL=${COSMOS_REST_URL:-https://cosmoshub-testnet.api.kjnodes.com}
      - COSMOS_RPC_URL=${COSMOS_RPC_URL:-https://cosmoshub-testnet.rpc.kjnodes.com}
      - COSMOS_KEEPER_MNEMONIC=${COSMOS_KEEPER_MNEMONIC:-}
      - SUI_RPC_URL=${SUI_RPC_URL:-https://fullnode.testnet.sui.io:443}
      - SUI_KEEPER_PRIVATE_KEY=${SUI_KEEPER_PRIVATE_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENV=${SENTRY_ENV:-production}
      - LOOP_PROXY_ENABLED=${LOOP_PROXY_ENABLED:-true}
      - LOOP_API_UPSTREAM=${LOOP_API_UPSTREAM:-https://devnet.cantonloop.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - cantonstake-frontend:local
      cache_to:
        - type=inline
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4001}
        NEXT_PUBLIC_MOCK_VALIDATOR_SHARE: ${MOCK_VALIDATOR_SHARE_ADDRESS}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
        NEXT_PUBLIC_MOCK_LOOP_PARTY_ID: ${NEXT_PUBLIC_MOCK_LOOP_PARTY_ID:-}
        NEXT_PUBLIC_LOOP_NETWORK: ${NEXT_PUBLIC_LOOP_NETWORK:-devnet}
        NEXT_PUBLIC_LOOP_SDK_ENABLED: ${NEXT_PUBLIC_LOOP_SDK_ENABLED:-true}
        NEXT_PUBLIC_CC_USD: ${NEXT_PUBLIC_CC_USD:-0.16}
        NEXT_PUBLIC_USE_REAL_VALIDATOR_SHARE: ${NEXT_PUBLIC_USE_REAL_VALIDATOR_SHARE:-false}
        NEXT_PUBLIC_REAL_VALIDATOR_SHARES: ${NEXT_PUBLIC_REAL_VALIDATOR_SHARES:-{}}
        NEXT_PUBLIC_LOOP_USE_BACKEND_PROXY: ${NEXT_PUBLIC_LOOP_USE_BACKEND_PROXY:-true}
        NEXT_PUBLIC_LOOP_API_URL: ${NEXT_PUBLIC_LOOP_API_URL:-}
        NEXT_PUBLIC_LOOP_WALLET_URL: ${NEXT_PUBLIC_LOOP_WALLET_URL:-}
        NEXT_PUBLIC_SUI_NETWORK: ${NEXT_PUBLIC_SUI_NETWORK:-testnet}
        NEXT_PUBLIC_SUI_RPC_URL: ${NEXT_PUBLIC_SUI_RPC_URL:-https://fullnode.testnet.sui.io:443}
        NEXT_PUBLIC_COSMOS_CHAIN_ID: ${NEXT_PUBLIC_COSMOS_CHAIN_ID:-theta-testnet-001}
        NEXT_PUBLIC_COSMOS_CHAIN_NAME: ${NEXT_PUBLIC_COSMOS_CHAIN_NAME:-Cosmos Hub Theta Testnet}
        NEXT_PUBLIC_COSMOS_RPC: ${NEXT_PUBLIC_COSMOS_RPC:-https://cosmoshub-testnet.rpc.kjnodes.com}
        NEXT_PUBLIC_COSMOS_REST: ${NEXT_PUBLIC_COSMOS_REST:-https://cosmoshub-testnet.api.kjnodes.com}
        NEXT_PUBLIC_COSMOS_COIN_DENOM: ${NEXT_PUBLIC_COSMOS_COIN_DENOM:-ATOM}
        NEXT_PUBLIC_COSMOS_COIN_MINIMAL_DENOM: ${NEXT_PUBLIC_COSMOS_COIN_MINIMAL_DENOM:-uatom}
        NEXT_PUBLIC_COSMOS_COIN_DECIMALS: ${NEXT_PUBLIC_COSMOS_COIN_DECIMALS:-6}
        NEXT_PUBLIC_COSMOS_COIN_TYPE: ${NEXT_PUBLIC_COSMOS_COIN_TYPE:-118}
    image: ${FRONTEND_IMAGE:-cantonstake-frontend:local}
    container_name: cantonstake-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4001}
      - NEXT_PUBLIC_MOCK_VALIDATOR_SHARE=${MOCK_VALIDATOR_SHARE_ADDRESS}
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
      - NEXT_PUBLIC_MOCK_LOOP_PARTY_ID=${NEXT_PUBLIC_MOCK_LOOP_PARTY_ID:-}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
