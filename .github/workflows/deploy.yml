name: Build and deploy

# Triggers on every push to main, plus a manual button on the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Concurrency: a new push cancels an in-flight build for the same branch
# so we never deploy a stale image after a queued one.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # Build frontend + backend in parallel using a matrix. Each lands as
  # ghcr.io/<owner>/cantonstake-<service>:latest plus a SHA-tagged copy
  # so rollbacks are one `docker compose pull` away.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: backend
            context: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute lower-cased owner because GHCR rejects mixed-case repo names.
      - name: Compute image name
        id: image
        run: |
          OWNER_LC=$(echo "${{ env.IMAGE_OWNER }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${{ env.REGISTRY }}/${OWNER_LC}/cantonstake-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          # GHA cache survives across runs and is per-service so the frontend
          # cache doesn't get evicted by a backend-only change.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # Frontend reads NEXT_PUBLIC_* at build time. Pass them as ARGs
          # from GH Actions Variables (non-secret) and Secrets (sensitive).
          # Backend ignores unknown ARGs so passing them to both is safe.
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_MOCK_VALIDATOR_SHARE=${{ vars.NEXT_PUBLIC_MOCK_VALIDATOR_SHARE }}
            NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
            NEXT_PUBLIC_MOCK_LOOP_PARTY_ID=${{ vars.NEXT_PUBLIC_MOCK_LOOP_PARTY_ID }}
            NEXT_PUBLIC_LOOP_NETWORK=${{ vars.NEXT_PUBLIC_LOOP_NETWORK }}
            NEXT_PUBLIC_LOOP_SDK_ENABLED=${{ vars.NEXT_PUBLIC_LOOP_SDK_ENABLED }}
            NEXT_PUBLIC_CC_USD=${{ vars.NEXT_PUBLIC_CC_USD }}
            NEXT_PUBLIC_USE_REAL_VALIDATOR_SHARE=${{ vars.NEXT_PUBLIC_USE_REAL_VALIDATOR_SHARE }}
            NEXT_PUBLIC_REAL_VALIDATOR_SHARES=${{ vars.NEXT_PUBLIC_REAL_VALIDATOR_SHARES }}

  # SSH into the VPS, pull the new images, restart compose. Runs after
  # both image builds succeed.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Compute image refs
        id: image
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "frontend=ghcr.io/${OWNER_LC}/cantonstake-frontend:latest" >> "$GITHUB_OUTPUT"
          echo "backend=ghcr.io/${OWNER_LC}/cantonstake-backend:latest" >> "$GITHUB_OUTPUT"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # The VPS just needs docker-compose.yml + .env in DEPLOY_PATH.
          # Source code is NOT cloned on the VPS — images come from GHCR.
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            export FRONTEND_IMAGE="${{ steps.image.outputs.frontend }}"
            export BACKEND_IMAGE="${{ steps.image.outputs.backend }}"
            docker compose pull
            docker compose up -d
            docker image prune -f
            echo "✅ Deployed. Containers:"
            docker compose ps
